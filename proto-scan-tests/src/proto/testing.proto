syntax = "proto3";
package testing;

message MultiFieldMessage {
  string name = 1;
  int32 id = 2;
  bool flag = 3;

}

// Our address book file is just one of these.
message WithRepeats {
  repeated MultiFieldMessage messages = 1;

  enum EnumType {
    A = 0;
    B = 1;
    C = 2;
  }

  repeated EnumType packed_enum = 2;

  repeated bool packed_bool = 3;

  repeated uint64 packed_varint = 4;
  repeated uint64 unpacked_varint = 5 [packed = false];

  repeated fixed32 packed_fixed32 = 6;
  repeated fixed32 unpacked_fixed32 = 7 [packed = false];
  
  repeated fixed64 packed_fixed64 = 8;
  repeated fixed64 unpacked_fixed64 = 9 [packed = false];
}


message ScanExample {
  repeated MultiFieldMessage repeated_msg = 1;
  MultiFieldMessage single_msg = 2;
  repeated bool repeated_bool = 3;
  optional bool single_bool = 4;
  oneof oneof_group{
    bool oneof_bool = 5;
    fixed32 oneof_fixed32 = 6;
    MultiFieldMessage oneof_message = 7;
  }
  optional fixed64 single_fixed64 = 8;
}

message SingleFieldTypes {
  int32 int32_field = 1;
  int64 int64_field = 2;
  uint32 uint32_field = 3;
  uint64 uint64_field = 4;
  sint32 sint32_field = 5;
  sint64 sint64_field = 6;
  bool bool_field = 7;
  EnumType enum_field = 8;
  fixed64 fixed64_field = 9;
  sfixed64 sfixed64_field = 10;
  double double_field = 11;
  fixed32 fixed32_field = 12;
  sfixed32 sfixed32_field = 13;
  float float_field = 14;
}

enum EnumType {
  zero = 0;
  one = 1;
  two = 2;
}

message BytesFieldTypes {
  bytes bytes_field = 1;
  string string_field = 2;
  repeated bytes repeated_bytes_field = 3;
  repeated string repeated_string_field = 4;
}